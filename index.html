<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for u 💌</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins", sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#ffb7d5 0%,#ff8fb1 35%,#ff5c8a 100%);
}

/* particle hearts */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.heart{
    position:absolute;
    color:#ffffff88;
    animation:float 10s linear infinite;
    user-select:none;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1.3);
        opacity:0;
    }
}

/* big heart shape */
.big-heart{
    position:absolute;
    width:300px;
    height:300px;
    z-index:0;
    opacity:0.15;
    animation:pulse 3s infinite;
}

.big-heart::before,
.big-heart::after{
    content:"";
    position:absolute;
    width:150px;
    height:240px;
    background:white;
    border-radius:150px 150px 0 0;
}

.big-heart::before{
    left:75px;
    transform:rotate(-45deg);
    transform-origin:0 100%;
}

.big-heart::after{
    left:-5px;
    transform:rotate(45deg);
    transform-origin:100% 100%;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.06);
    }
}

.card{
    width:340px;
    padding:35px;
    border-radius:30px;
    backdrop-filter:blur(15px);
    background:#ffffff25;
    border:1px solid #ffffff40;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    text-align:center;
    position:relative;
    z-index:2;
}

h1{
    color:white;
    font-size:32px;
    margin-bottom:15px;
}

p{
    color:white;
    font-size:17px;
    line-height:1.6;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:13px 24px;
    border-radius:16px;
    font-size:15px;
    cursor:pointer;
    transition:0.25s;
    font-weight:600;
}

#yes{
    background:white;
    color:#ff4f8b;
}

#yes:hover{
    transform:scale(1.08);
}

#later{
    background:#ffffff35;
    color:white;
}

#later:hover{
    background:#ffffff55;
}

.result{
    animation:fade 0.6s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="hearts"></div>
<div class="big-heart"></div>

<div class="card" id="card">
    <h1>haiii 💖</h1>

    <p>
        aku nyaman banget sama kamu.<br><br>
        jadiii...<br>
        mau jadi <b>TRP</b> aku ga? 🥺
    </p>

    <div class="buttons">
        <button id="yes">mau 💕</button>
        <button id="later">nanti dulu deh 🙈</button>
    </div>
</div>

<script>

/* floating hearts */
const heartsContainer = document.querySelector(".hearts");

for(let i = 0; i < 45; i++){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (12 + Math.random()*25) + "px";
    heart.style.animationDuration = (5 + Math.random()*7) + "s";
    heart.style.animationDelay = Math.random()*5 + "s";

    heartsContainer.appendChild(heart);
}

/* button actions */
const yes = document.getElementById("yes");
const later = document.getElementById("later");
const card = document.getElementById("card");

yes.onclick = () => {
    card.innerHTML = `
    <div class="result">
        <h1>YEAYYYY 💖</h1>
        <p>
            sekarang kamu resmi jadi<br>
            <b>teman rasa pacar</b> aku 😆💕
            <br><br>
            makasii udah nerima akuu ✨
        </p>
    </div>
    `;
};

later.onclick = () => {
    card.innerHTML = `
    <div class="result">
        <h1>hehe okii 🙈</h1>
        <p>
            aku tunggu jawaban terbaik dari kamu yaa 💖
        </p>
    </div>
    `;
};

</script>

</body>
</html>
